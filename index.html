<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>mischievous playground</title>
<link href="https://fonts.googleapis.com/css2?family=Indie+Flower&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
/* ─────────────────────────────────────────
   TOKENS
───────────────────────────────────────── */
:root{
  --bg:#fafaf8;
  --grid:rgba(200,220,255,.07);
  --text:#2d2d2d;
  --text-mute:#999;
  --text-dim:#bbb;
  --card:#ffffff;
  --card-border:rgba(0,0,0,.07);
  --card-border-strong:rgba(0,0,0,.08);
  --shadow:rgba(0,0,0,.04);
  --shadow-hover:rgba(0,0,0,.12);
  --pink:#f4a7b9;
  --purple:#c9a6e8;
  --yellow:#ffd97d;
  --green:#a8d8a8;
  --blue:#a8c8e8;
}
body.dark{
  --bg:#15131f;
  --grid:rgba(180,160,220,.05);
  --text:#f0ebf5;
  --text-mute:#8a7d99;
  --text-dim:#6c627a;
  --card:#221f30;
  --card-border:rgba(255,255,255,.07);
  --card-border-strong:rgba(255,255,255,.1);
  --shadow:rgba(0,0,0,.3);
  --shadow-hover:rgba(0,0,0,.5);
  --pink:#f8b8c9;
  --purple:#d9bbf0;
  --yellow:#ffe09a;
  --green:#bde6bd;
  --blue:#bcd4ee;
}

/* ─────────────────────────────────────────
   BASE
───────────────────────────────────────── */
*{margin:0;padding:0;box-sizing:border-box;}
body{
  background:var(--bg);
  font-family:'Indie Flower','Nunito',cursive;
  color:var(--text);
  min-height:100vh;
  overflow-x:hidden;
  cursor:none;
  background-image:
    linear-gradient(var(--grid) 1px,transparent 1px),
    linear-gradient(90deg,var(--grid) 1px,transparent 1px);
  background-size:28px 28px;
  transition:background-color .5s,color .5s;
}

/* ─────────────────────────────────────────
   CURSOR
───────────────────────────────────────── */
#cur{
  position:fixed;width:20px;height:20px;
  pointer-events:none;z-index:99999;
  transform:translate(-50%,-50%);
  transition:transform .06s ease;
}

/* ─────────────────────────────────────────
   HERO
───────────────────────────────────────── */
.hero{
  position:relative;width:100%;
  height:100vh;min-height:600px;
  overflow:hidden;
}
.hero-img{
  position:absolute;inset:0;
  width:100%;height:100%;
  object-fit:cover;object-position:center;
  display:block;opacity:0;
  transition:opacity .6s;
}
.hero-img.active{opacity:1;}

.scroll-hint{
  position:absolute;left:50%;bottom:32px;
  transform:translateX(-50%);
  color:white;font-size:14px;font-weight:700;
  letter-spacing:.5px;text-shadow:0 2px 8px rgba(0,0,0,.4);
  text-align:center;animation:bounceY 2s ease-in-out infinite;
  pointer-events:none;z-index:5;
}
.scroll-hint .arrow{display:block;font-size:22px;margin-top:4px;}
@keyframes bounceY{0%,100%{transform:translate(-50%,0);}50%{transform:translate(-50%,8px);}}

/* ─────────────────────────────────────────
   SECTION LABEL
───────────────────────────────────────── */
.section-label{
  text-align:center;font-size:18px;font-weight:700;
  color:var(--text-mute);letter-spacing:.5px;
}
.section-label .deco{color:var(--pink);margin:0 8px;}

/* ─────────────────────────────────────────
   PLAYGROUND MAP — LARGE
───────────────────────────────────────── */
.playground-map{
  padding:44px 30px 16px;
  display:flex;flex-direction:column;align-items:center;gap:22px;
}

.map-container{
  position:relative;
  width:100%;
  /* big enough to fill 13" Macbook at ~1280px CSS viewport */
  max-width:1240px;
  border-radius:20px;overflow:hidden;
  box-shadow:0 6px 32px rgba(0,0,0,.1),0 2px 8px rgba(0,0,0,.05);
  transition:box-shadow .4s;
}
body.dark .map-container{
  box-shadow:0 8px 40px rgba(0,0,0,.5),0 2px 8px rgba(0,0,0,.25);
}

.map-img{display:block;width:100%;height:auto;transition:opacity .6s;user-select:none;pointer-events:none;}
.map-dark{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;opacity:0;}
body.dark .map-light{opacity:0;}
body.dark .map-dark {opacity:1;}

/* ── HOTSPOTS
   Positions based on the actual map illustration:
   scraps=green left, lens=blue center-top,
   words=purple right, playroom=yellow center-bottom, me=pink house right
── */
.hs{
  position:absolute;cursor:none;text-decoration:none;
  display:flex;align-items:center;justify-content:center;
  transition:background .25s,transform .22s;
  /* slightly rounded to follow island shapes */
  border-radius:50%;
}
.hs:hover{background:rgba(255,255,255,.2);transform:scale(1.03);}
body.dark .hs:hover{background:rgba(255,255,255,.12);}

/* scraps — green island, left */
#hs-scraps  { left:1%;  top:17%; width:31%; height:70%; }
/* lens — blue lake, center top */
#hs-lens    { left:28%; top:4%;  width:34%; height:53%; }
/* words — purple island, right */
#hs-words   { left:62%; top:17%; width:30%; height:58%; }
/* playroom — yellow sand, center bottom */
#hs-playroom{ left:26%; top:48%; width:38%; height:42%; }
/* me — pink house, bottom right */
#hs-me      { left:61%; top:47%; width:33%; height:48%; }

/* tooltip */
.hs-tip{
  position:absolute;bottom:calc(100% + 8px);left:50%;transform:translateX(-50%);
  background:var(--card);border:1.5px solid var(--card-border-strong);
  border-radius:20px;padding:5px 14px;font-size:13px;font-weight:800;
  white-space:nowrap;pointer-events:none;
  opacity:0;transition:opacity .18s;
  box-shadow:0 4px 14px var(--shadow-hover);z-index:10;
}
.hs:hover .hs-tip{opacity:1;}
#hs-scraps   .hs-tip{color:#f4a7b9;border-color:rgba(244,167,185,.4);}
#hs-lens     .hs-tip{color:#a8d8a8;border-color:rgba(168,216,168,.4);}
#hs-words    .hs-tip{color:#a8c8e8;border-color:rgba(168,200,232,.4);}
#hs-playroom .hs-tip{color:#ffd97d;border-color:rgba(255,217,125,.4);}
#hs-me       .hs-tip{color:#c9a6e8;border-color:rgba(201,166,232,.4);}

/* mobile pill nav */
.map-mobile-nav{
  display:none;flex-wrap:wrap;justify-content:center;gap:10px;padding:0 20px;
}
.mobile-link{
  padding:9px 22px;border-radius:20px;font-size:14px;font-weight:800;
  text-decoration:none;border:1.5px solid;transition:transform .2s,opacity .2s;
}
.mobile-link:active{transform:scale(.96);}

/* ─────────────────────────────────────────
   LATEST SCRAPS — table bg + card overlay
───────────────────────────────────────── */
.latest-section{
  position:relative;
  line-height:0; /* kill gap under img */
}

/* table images: light sits in normal flow → sets section height */
.table-img{
  display:block;width:100%;height:auto;
  transition:opacity .6s;
  user-select:none;pointer-events:none;
}
.table-dark-img{
  position:absolute;inset:0;
  width:100%;height:100%;object-fit:cover;
  opacity:0;transition:opacity .6s;
  z-index:1;
}
body.dark .table-dark-img{opacity:1;}
body.dark .table-light   {opacity:0;}

/* card overlay — sits on the gingham tablecloth area
   top ~50% ≈ where the tablecloth surface begins in the illustration
   nudge up/down if cards land above/below the table surface */
.latest-cards-overlay{
  position:absolute;
  top:50%;
  left:5%;right:5%;
  z-index:2;
  line-height:normal;
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:12px;
}

/* zine card grid */
.zine-row{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:14px;
  width:100%;
}

.zine-card{
  border-radius:14px;overflow:hidden;
  display:flex;flex-direction:column;
  background:var(--card);
  border:1.5px solid var(--card-border);
  /* soft shadow so cards lift off the tablecloth */
  box-shadow:2px 4px 16px rgba(0,0,0,.12),0 1px 0 var(--shadow);
  text-decoration:none;color:inherit;
  cursor:none;
  transition:transform .22s,box-shadow .22s,background .4s,border-color .4s;
}
.zine-card:hover{
  transform:translateY(-8px) rotate(1deg);
  box-shadow:6px 16px 32px rgba(0,0,0,.18);
}
body.dark .zine-card{
  box-shadow:2px 4px 16px rgba(0,0,0,.4),0 1px 0 var(--shadow);
}

.zine-thumb{
  width:100%;aspect-ratio:4/3;
  object-fit:cover;display:block;
  pointer-events:none;
}
.zine-thumb-grad{
  width:100%;aspect-ratio:4/3;
  display:flex;align-items:center;justify-content:center;
  font-size:28px;position:relative;
}

.zine-info{
  padding:9px 11px 12px;
  border-top:1px solid var(--divider);
}
.zine-name{
  font-size:12px;font-weight:700;line-height:1.4;color:var(--text);
}

/* badges */
.live-badge{
  position:absolute;top:8px;left:8px;z-index:2;
  background:#2d2d2d;color:white;
  font-size:9px;font-weight:800;
  padding:2px 8px;border-radius:3px;letter-spacing:.4px;
}
body.dark .live-badge{background:#f0ebf5;color:#15131f;}

.soon-overlay{
  position:absolute;bottom:0;left:0;right:0;
  background:rgba(255,255,255,.72);
  backdrop-filter:blur(2px);
  text-align:center;padding:5px;
  font-size:11px;font-weight:700;color:#aaa;z-index:3;
}
body.dark .soon-overlay{background:rgba(34,31,48,.78);color:#bbb;}

.see-all-link{
  font-size:14px;font-weight:800;
  color:#f4a7b9;text-decoration:none;
  border-bottom:1.5px dashed #f4a7b9;
  padding-bottom:1px;transition:opacity .2s;
  text-shadow:0 1px 4px rgba(255,255,255,.7);
}
body.dark .see-all-link{text-shadow:0 1px 4px rgba(0,0,0,.5);}
.see-all-link:hover{opacity:.65;}

/* divider token (needed by zine-info) */
:root{ --divider:rgba(0,0,0,.06); }
body.dark{ --divider:rgba(255,255,255,.07); }

/* ─────────────────────────────────────────
   FOOTER — illustrated image
───────────────────────────────────────── */
.footer-section{
  position:relative;
  width:100%;
  display:block;
  margin-top:-2px; /* prevent gap between table and footer */
}
.footer-bg{
  display:block;width:100%;height:auto;
  transition:opacity .6s;
  user-select:none;pointer-events:none;
  vertical-align:bottom;
}
.footer-dark-img{
  position:absolute;inset:0;
  width:100%;height:100%;object-fit:cover;
  opacity:0;transition:opacity .6s;
}
body.dark .footer-dark-img{opacity:1;}
body.dark .footer-light   {opacity:0;}

/* ─────────────────────────────────────────
   ENTRANCE ANIMATIONS
───────────────────────────────────────── */
.playground-map,.latest-section{
  opacity:0;transform:translateY(16px);
  animation:up .55s ease forwards;
}
.playground-map {animation-delay:.08s;}
.latest-section {animation-delay:.22s;}
.footer-section {animation:fadeIn .8s ease .4s both;}
@keyframes up{from{opacity:0;transform:translateY(16px);}to{opacity:1;transform:translateY(0);}}
@keyframes fadeIn{from{opacity:0;}to{opacity:1;}}

/* ─────────────────────────────────────────
   RESPONSIVE
───────────────────────────────────────── */
@media(max-width:1024px){
  .playground-map{padding:32px 20px 12px;}
}

@media(max-width:768px){
  .hero{height:70vh;min-height:480px;}
  .playground-map{padding:28px 12px 10px;}
  .map-container .hs{display:none;}
  .map-mobile-nav{display:flex;}
  .latest-cards-overlay{top:44%;left:3%;right:3%;}
  .zine-row{grid-template-columns:repeat(2,1fr);}
}

@media(max-width:480px){
  .latest-cards-overlay{top:38%;}
  .zine-row{grid-template-columns:1fr 1fr;gap:8px;}
}
</style>
</head>
<body>

<script>
/* ────────────────────────────────────────
   CURSOR + SPARKLE TRAIL (always on)
──────────────────────────────────────── */
const cur = document.getElementById('cur');
const syms = ['✦','✧','♡','✿','★','◇','☆','·','˖'];
const cols  = ['#f4a7b9','#c9a6e8','#ffd97d','#a8d8a8','#a8c8e8'];

// inject keyframes once
const _s = document.createElement('style');
_s.textContent = `
@keyframes burst{
  0%  {opacity:1;transform:translate(0,0) scale(1);}
  100%{opacity:0;transform:translate(var(--tx),var(--ty)) scale(.25);}
}
@keyframes trail{
  0%  {opacity:.85;transform:translate(0,0) scale(1);}
  100%{opacity:0;transform:translate(var(--tx),var(--ty)) scale(.1);}
}`;
document.head.appendChild(_s);

// trail: fires every ~60ms on move
let lastTrail = 0;
document.addEventListener('mousemove', e => {
  cur.style.left = e.clientX + 'px';
  cur.style.top  = e.clientY + 'px';

  const now = Date.now();
  if(now - lastTrail < 60) return;
  lastTrail = now;

  const el = document.createElement('span');
  el.textContent = syms[Math.floor(Math.random() * syms.length)];
  const angle = Math.random() * Math.PI * 2;
  const dist  = 8 + Math.random() * 16;
  el.style.cssText = [
    'position:fixed',
    `left:${e.clientX}px`,
    `top:${e.clientY}px`,
    `font-size:${7 + Math.random() * 9}px`,
    `color:${cols[Math.floor(Math.random() * cols.length)]}`,
    'pointer-events:none',
    'z-index:99998',
    `--tx:${Math.cos(angle)*dist}px`,
    `--ty:${Math.sin(angle)*dist - 10}px`,
    'animation:trail .65s ease forwards',
  ].join(';');
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 650);
});

// click: bigger burst
document.addEventListener('click', e => {
  for(let i = 0; i < 8; i++){
    const el = document.createElement('span');
    el.textContent = syms[Math.floor(Math.random() * syms.length)];
    const a = Math.random() * Math.PI * 2;
    const d = 28 + Math.random() * 48;
    el.style.cssText = [
      'position:fixed',
      `left:${e.clientX}px`,
      `top:${e.clientY}px`,
      `font-size:${12 + Math.random() * 14}px`,
      `color:${cols[Math.floor(Math.random() * cols.length)]}`,
      'pointer-events:none',
      'z-index:99998',
      `--tx:${Math.cos(a)*d}px`,
      `--ty:${Math.sin(a)*d}px`,
      'animation:burst .75s ease forwards',
    ].join(';');
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 750);
  }
});

/* ────────────────────────────────────────
   HERO DARK / LIGHT SWAP
──────────────────────────────────────── */
const heroLight = document.getElementById('heroLight');
const heroDark  = document.getElementById('heroDark');
function syncHero(){
  const dark = document.body.classList.contains('dark');
  heroLight.classList.toggle('active', !dark);
  heroDark.classList.toggle('active',   dark);
}
syncHero();
document.addEventListener('mp-theme-change', syncHero);
</script>
<script src="theme.js"></script>
