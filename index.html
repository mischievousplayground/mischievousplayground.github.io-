<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>mischievous playground</title>
<link href="https://fonts.googleapis.com/css2?family=Indie+Flower&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
/* ── tokens ── */
:root{
  --bg:#fafaf8;--grid:rgba(200,220,255,.07);
  --text:#2d2d2d;--text-mute:#999;--text-dim:#bbb;
  --card:#ffffff;--card-border:rgba(0,0,0,.07);--card-border-strong:rgba(0,0,0,.08);
  --shadow:rgba(0,0,0,.04);--shadow-hover:rgba(0,0,0,.12);
  --divider:rgba(0,0,0,.06);
  --pink:#f4a7b9;--purple:#c9a6e8;--yellow:#ffd97d;--green:#a8d8a8;--blue:#a8c8e8;
}
body.dark{
  --bg:#15131f;--grid:rgba(180,160,220,.05);
  --text:#f0ebf5;--text-mute:#8a7d99;--text-dim:#6c627a;
  --card:#221f30;--card-border:rgba(255,255,255,.07);--card-border-strong:rgba(255,255,255,.1);
  --shadow:rgba(0,0,0,.3);--shadow-hover:rgba(0,0,0,.5);
  --divider:rgba(255,255,255,.07);
  --pink:#f8b8c9;--purple:#d9bbf0;--yellow:#ffe09a;--green:#bde6bd;--blue:#bcd4ee;
}

/* ── base ── */
*{margin:0;padding:0;box-sizing:border-box;}
body{
  background:var(--bg);
  font-family:'Indie Flower','Nunito',cursive;
  color:var(--text);min-height:100vh;overflow-x:hidden;cursor:none;
  background-image:linear-gradient(var(--grid) 1px,transparent 1px),linear-gradient(90deg,var(--grid) 1px,transparent 1px);
  background-size:28px 28px;
  transition:background-color .5s,color .5s;
}

/* ── cursor ── */
#cur{position:fixed;width:20px;height:20px;pointer-events:none;z-index:99999;transform:translate(-50%,-50%);}

/* ── hero ── */
.hero{position:relative;width:100%;height:100vh;min-height:600px;overflow:hidden;}
.hero-img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;display:block;opacity:0;transition:opacity .6s;}
.hero-img.active{opacity:1;}
.scroll-hint{
  position:absolute;left:50%;bottom:32px;transform:translateX(-50%);
  color:white;font-size:14px;font-weight:700;letter-spacing:.5px;
  text-shadow:0 2px 8px rgba(0,0,0,.4);text-align:center;
  animation:bounceY 2s ease-in-out infinite;pointer-events:none;z-index:5;
}
.scroll-hint .arrow{display:block;font-size:22px;margin-top:4px;}
@keyframes bounceY{0%,100%{transform:translate(-50%,0);}50%{transform:translate(-50%,8px);}}

/* ── section label ── */
.section-label{text-align:center;font-size:18px;font-weight:700;color:var(--text-mute);letter-spacing:.5px;}
.section-label .deco{color:var(--pink);margin:0 8px;}

/* ══ PLAYGROUND MAP ══ */
.playground-map{padding:44px 30px 16px;display:flex;flex-direction:column;align-items:center;gap:22px;}

.map-container{
  position:relative;width:100%;max-width:1240px;
  border-radius:20px;overflow:hidden;
  box-shadow:0 6px 32px rgba(0,0,0,.1),0 2px 8px rgba(0,0,0,.05);
  transition:box-shadow .4s;
}
body.dark .map-container{box-shadow:0 8px 40px rgba(0,0,0,.5),0 2px 8px rgba(0,0,0,.25);}

.map-img{display:block;width:100%;height:auto;transition:opacity .6s;user-select:none;pointer-events:none;}
.map-dark{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;opacity:0;}
body.dark .map-light{opacity:0;}
body.dark .map-dark{opacity:1;}

/* hotspots */
.hs{position:absolute;border-radius:50%;cursor:none;text-decoration:none;display:flex;align-items:center;justify-content:center;transition:background .25s,transform .22s;}
.hs:hover{background:rgba(255,255,255,.2);transform:scale(1.03);}
body.dark .hs:hover{background:rgba(255,255,255,.12);}

#hs-scraps  {left:1%; top:17%;width:31%;height:70%;}
#hs-lens    {left:28%;top:4%; width:34%;height:53%;}
#hs-words   {left:62%;top:17%;width:30%;height:58%;}
#hs-playroom{left:26%;top:48%;width:38%;height:42%;}
#hs-me      {left:61%;top:47%;width:33%;height:48%;}

.hs-tip{
  position:absolute;bottom:calc(100% + 8px);left:50%;transform:translateX(-50%);
  background:var(--card);border:1.5px solid var(--card-border-strong);
  border-radius:20px;padding:5px 14px;font-size:13px;font-weight:800;
  white-space:nowrap;pointer-events:none;opacity:0;transition:opacity .18s;
  box-shadow:0 4px 14px var(--shadow-hover);z-index:10;
}
.hs:hover .hs-tip{opacity:1;}
#hs-scraps   .hs-tip{color:#f4a7b9;border-color:rgba(244,167,185,.4);}
#hs-lens     .hs-tip{color:#a8d8a8;border-color:rgba(168,216,168,.4);}
#hs-words    .hs-tip{color:#a8c8e8;border-color:rgba(168,200,232,.4);}
#hs-playroom .hs-tip{color:#ffd97d;border-color:rgba(255,217,125,.4);}
#hs-me       .hs-tip{color:#c9a6e8;border-color:rgba(201,166,232,.4);}

/* mobile pill nav */
.map-mobile-nav{display:none;flex-wrap:wrap;justify-content:center;gap:10px;padding:0 20px;}
.mobile-link{padding:9px 22px;border-radius:20px;font-size:14px;font-weight:800;text-decoration:none;border:1.5px solid;transition:transform .2s;}
.mobile-link:active{transform:scale(.96);}

/* ══ LATEST SCRAPS — card grid (max 4) ══ */
.latest-section{padding:40px 60px 48px;position:relative;}

.tape-row{display:flex;gap:12px;margin-bottom:28px;}
.tape{height:14px;border-radius:3px;opacity:.42;}

.latest-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;flex-wrap:wrap;gap:10px;}
.latest-title{font-size:20px;font-weight:800;display:flex;align-items:center;gap:8px;}

.see-all-link{font-size:14px;font-weight:800;color:#f4a7b9;text-decoration:none;border-bottom:1.5px dashed #f4a7b9;padding-bottom:1px;transition:opacity .2s;}
.see-all-link:hover{opacity:.65;}

/* always exactly 4 columns on desktop */
.zine-row{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;}

.zine-card{
  border-radius:14px;overflow:hidden;display:flex;flex-direction:column;
  background:var(--card);border:1.5px solid var(--card-border);
  box-shadow:1px 2px 0 var(--shadow);
  text-decoration:none;color:inherit;cursor:none;
  transition:transform .22s,box-shadow .22s,background .4s,border-color .4s;
}
.zine-card:hover{transform:translateY(-7px) rotate(1deg);box-shadow:4px 12px 24px var(--shadow-hover);}

.zine-thumb{width:100%;aspect-ratio:4/3;object-fit:cover;display:block;pointer-events:none;}
.zine-thumb-grad{width:100%;aspect-ratio:4/3;display:flex;align-items:center;justify-content:center;font-size:28px;position:relative;}
.zine-info{padding:9px 11px 12px;border-top:1px solid var(--divider);}
.zine-name{font-size:12px;font-weight:700;line-height:1.4;color:var(--text);}

.live-badge{position:absolute;top:8px;left:8px;z-index:2;background:#2d2d2d;color:white;font-size:9px;font-weight:800;padding:2px 8px;border-radius:3px;letter-spacing:.4px;}
body.dark .live-badge{background:#f0ebf5;color:#15131f;}

.soon-overlay{position:absolute;bottom:0;left:0;right:0;background:rgba(255,255,255,.72);backdrop-filter:blur(2px);text-align:center;padding:5px;font-size:11px;font-weight:700;color:#aaa;z-index:3;}
body.dark .soon-overlay{background:rgba(34,31,48,.78);color:#bbb;}

/* ══ FOOTER — illustrated image ══ */
.footer-section{position:relative;width:100%;display:block;}
.footer-bg{display:block;width:100%;height:auto;transition:opacity .6s;user-select:none;pointer-events:none;vertical-align:bottom;}
.footer-dark-img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;opacity:0;transition:opacity .6s;}
body.dark .footer-dark-img{opacity:1;}
body.dark .footer-light{opacity:0;}

/* ── entrance animations ── */
.playground-map,.latest-section{opacity:0;transform:translateY(16px);animation:up .55s ease forwards;}
.playground-map{animation-delay:.08s;}
.latest-section{animation-delay:.22s;}
.footer-section{animation:fadeIn .8s ease .4s both;}
@keyframes up{from{opacity:0;transform:translateY(16px);}to{opacity:1;transform:translateY(0);}}
@keyframes fadeIn{from{opacity:0;}to{opacity:1;}}

/* ── responsive ── */
@media(max-width:1024px){
  .playground-map{padding:32px 20px 12px;}
  .latest-section{padding:32px 30px 40px;}
}
@media(max-width:768px){
  .hero{height:70vh;min-height:480px;}
  .playground-map{padding:24px 14px 10px;}
  .map-container .hs{display:none;}
  .map-mobile-nav{display:flex;}
  .latest-section{padding:24px 16px 32px;}
  .zine-row{grid-template-columns:repeat(2,1fr);gap:12px;}
  .tape-row{margin-bottom:16px;}
}
@media(max-width:400px){
  .zine-row{grid-template-columns:repeat(2,1fr);gap:8px;}
  .latest-section{padding:20px 12px 28px;}
}
</style>
</head>

<script>
/* ── cursor + sparkle trail (always on) ── */
const cur = document.getElementById('cur');
const syms = ['✦','✧','♡','✿','★','◇','☆','·','˖'];
const cols  = ['#f4a7b9','#c9a6e8','#ffd97d','#a8d8a8','#a8c8e8'];

const _s = document.createElement('style');
_s.textContent = `
  @keyframes burst{0%{opacity:1;transform:translate(0,0) scale(1);}100%{opacity:0;transform:translate(var(--tx),var(--ty)) scale(.25);}}
  @keyframes trail{0%{opacity:.8;transform:translate(0,0) scale(1);}100%{opacity:0;transform:translate(var(--tx),var(--ty)) scale(.1);}}
`;
document.head.appendChild(_s);

function spark(x, y, big){
  const count = big ? 8 : 1;
  for(let i = 0; i < count; i++){
    const el = document.createElement('span');
    el.textContent = syms[Math.floor(Math.random() * syms.length)];
    const a = Math.random() * Math.PI * 2;
    const d = big ? 28 + Math.random() * 48 : 8 + Math.random() * 14;
    const size = big ? 12 + Math.random() * 14 : 7 + Math.random() * 8;
    const dur  = big ? 750 : 650;
    el.style.cssText = `position:fixed;left:${x}px;top:${y}px;font-size:${size}px;color:${cols[Math.floor(Math.random()*cols.length)]};pointer-events:none;z-index:99998;--tx:${Math.cos(a)*d}px;--ty:${Math.sin(a)*d - (big?0:10)}px;animation:${big?'burst':'trail'} ${dur}ms ease forwards;`;
    document.body.appendChild(el);
    setTimeout(() => el.remove(), dur);
  }
}

let lastTrail = 0;
document.addEventListener('mousemove', e => {
  cur.style.left = e.clientX + 'px';
  cur.style.top  = e.clientY + 'px';
  const now = Date.now();
  if(now - lastTrail < 60) return;
  lastTrail = now;
  spark(e.clientX, e.clientY, false);
});
document.addEventListener('click', e => spark(e.clientX, e.clientY, true));

/* ── hero dark/light swap ── */
const heroLight = document.getElementById('heroLight');
const heroDark  = document.getElementById('heroDark');
function syncHero(){
  const dark = document.body.classList.contains('dark');
  heroLight.classList.toggle('active', !dark);
  heroDark.classList.toggle('active',  dark);
}
syncHero();
document.addEventListener('mp-theme-change', syncHero);
</script>
<script src="theme.js"></script>
