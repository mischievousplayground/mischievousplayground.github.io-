<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>zines — mischievous playground</title>
<link href="https://fonts.googleapis.com/css2?family=Indie+Flower&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
  background:#fafaf8;
  font-family:'Indie Flower','Nunito',cursive;
  color:#2d2d2d;
  min-height:100vh;
  overflow-x:hidden;
  cursor:none;
  background-image:
    linear-gradient(rgba(200,220,255,.06) 1px,transparent 1px),
    linear-gradient(90deg,rgba(200,220,255,.06) 1px,transparent 1px);
  background-size:28px 28px;
}

#cur{position:fixed;width:20px;height:20px;pointer-events:none;z-index:99999;transform:translate(-50%,-50%);}

/* ── NAV ── */
nav{
  display:flex;align-items:center;
  padding:20px 36px;
  border-bottom:1px solid rgba(0,0,0,.06);
  gap:0;position:relative;z-index:10;
  background:#fafaf8;
}

.nav-brand{
  display:flex;flex-direction:column;
  text-decoration:none;color:inherit;
  margin-right:auto;
}
.nav-title{
  font-size:18px;font-weight:800;
  display:flex;align-items:center;gap:6px;
}
.nav-title span{color:#f4a7b9;font-size:15px;}
.nav-sub{font-size:12px;color:#aaa;margin-top:1px;}

.nav-links{display:flex;align-items:center;gap:32px;}
.nav-links a{
  font-family:'Indie Flower',cursive;
  font-size:16px;color:#555;text-decoration:none;
  position:relative;padding-bottom:4px;
  display:flex;align-items:center;gap:5px;
}
.nav-links a::after{
  content:'';position:absolute;bottom:0;left:0;
  width:100%;height:2.5px;border-radius:2px;
  transform:scaleX(0);transition:transform .25s;
  transform-origin:left;
}
.nav-links a.active{color:#222;}
.nav-links a.active::after{transform:scaleX(1);}
.nav-links a:nth-child(1)::after{background:#f4a7b9;}
.nav-links a:nth-child(2)::after{background:#a8c8e8;}
.nav-links a:nth-child(3)::after{background:#a8d8a8;}
.nav-links a:nth-child(4)::after{background:#c9a6e8;}
.nav-links a:hover::after{transform:scaleX(1);}
.nav-links a:hover{color:#222;}

.nav-right{display:flex;align-items:center;gap:14px;margin-left:32px;}

.sticky-nav{
  width:115px;background:#fffde7;
  border:1px solid rgba(0,0,0,.07);
  padding:10px 12px 14px;
  box-shadow:2px 3px 8px rgba(0,0,0,.09);
  transform:rotate(1.5deg);
  font-size:13px;font-weight:700;color:#666;
  line-height:1.5;position:relative;
  transition:transform .2s;cursor:none;
}
.sticky-nav::before{
  content:'';position:absolute;top:-8px;left:10px;
  width:32px;height:13px;border-radius:2px;
  background:rgba(201,166,232,.5);
}
.sticky-nav:hover{transform:rotate(0deg) scale(1.04);}
.sticky-nav .arr{color:#f4a7b9;font-size:16px;display:block;margin-top:4px;}

.nav-circle{
  width:30px;height:30px;border:2px solid #ccc;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:14px;color:#ccc;transition:transform .3s,border-color .3s;
}
.nav-circle:hover{transform:rotate(20deg);border-color:#f4a7b9;color:#f4a7b9;}

/* torn line under nav */
.torn-line{
  height:18px;
  background:white;
  clip-path:polygon(0 0,100% 0,100% 55%,99% 70%,98% 55%,97% 72%,96% 56%,95% 73%,94% 57%,93% 74%,92% 58%,91% 75%,90% 59%,89% 76%,88% 60%,87% 77%,86% 61%,85% 78%,84% 62%,83% 79%,82% 63%,81% 80%,80% 64%,79% 81%,78% 65%,77% 82%,76% 66%,75% 83%,74% 67%,73% 84%,72% 68%,71% 85%,70% 69%,69% 86%,68% 70%,67% 87%,66% 71%,65% 88%,64% 72%,63% 89%,62% 73%,61% 90%,60% 74%,59% 91%,58% 75%,57% 92%,56% 76%,55% 93%,54% 77%,53% 94%,52% 78%,51% 95%,50% 79%,49% 96%,48% 80%,47% 95%,46% 79%,45% 96%,44% 80%,43% 95%,42% 79%,41% 96%,40% 80%,39% 95%,38% 79%,37% 96%,36% 80%,35% 95%,34% 79%,33% 96%,32% 80%,31% 95%,30% 79%,29% 96%,28% 80%,27% 95%,26% 79%,25% 96%,24% 80%,23% 95%,22% 79%,21% 96%,20% 80%,19% 95%,18% 79%,17% 96%,16% 80%,15% 95%,14% 79%,13% 96%,12% 80%,11% 95%,10% 79%,9% 96%,8% 80%,7% 95%,6% 79%,5% 96%,4% 80%,3% 95%,2% 79%,1% 96%,0 80%);
  margin-bottom:0;
  border-bottom:1px solid rgba(0,0,0,.05);
}

/* flower doodle near nav */
.nav-flower{
  position:absolute;right:36px;top:68px;pointer-events:none;
}

/* ── PAGE LAYOUT ── */
.page{display:flex;padding:28px 36px;gap:24px;position:relative;}

/* ── LEFT SIDEBAR ── */
.sidebar{
  width:200px;flex-shrink:0;
  display:flex;flex-direction:column;gap:16px;
  position:relative;
}

/* cat area */
.cat-area{
  position:relative;
  height:130px;
  display:flex;align-items:flex-end;
}
.cat-speech-sb{
  position:absolute;left:68px;top:8px;
  background:white;border:2px solid #2d2d2d;border-radius:14px;
  padding:6px 12px;font-size:13px;font-weight:700;white-space:nowrap;
}
.cat-speech-sb::after{
  content:'';position:absolute;bottom:-12px;left:14px;
  border:7px solid transparent;border-top-color:#2d2d2d;
}
.cat-speech-sb::before{
  content:'';position:absolute;bottom:-7px;left:16px;
  border:5px solid transparent;border-top-color:white;z-index:1;
}

/* tags box */
.tags-box{
  background:#fffdf5;
  border:1.5px solid rgba(0,0,0,.08);
  border-radius:16px;
  padding:18px 16px 20px;
  position:relative;
}
.tags-box::before{
  content:'';position:absolute;top:-8px;right:16px;
  width:38px;height:14px;border-radius:2px;
  background:repeating-linear-gradient(90deg,rgba(201,166,232,.6) 0,rgba(201,166,232,.3) 4px,rgba(201,166,232,.6) 8px);
  opacity:.6;
}
.tags-box-title{
  font-size:14px;font-weight:700;margin-bottom:12px;
  display:flex;align-items:center;gap:6px;
  color:#f4a7b9;
}
.tag-row{
  display:flex;justify-content:space-between;
  align-items:center;padding:5px 0;
  border-bottom:1px dashed rgba(0,0,0,.07);
  cursor:none;transition:color .2s;
}
.tag-row:last-child{border-bottom:none;}
.tag-row:hover .tag-name{color:#f4a7b9;}
.tag-name{font-size:13px;font-weight:700;color:#555;}
.tag-count{font-size:12px;color:#bbb;}

/* flower doodle below tags */
.sidebar-flower{margin-top:4px;margin-left:auto;display:block;width:fit-content;}

/* can't decide box */
.decide-box{
  background:#f0e8ff;
  border:1.5px solid rgba(201,166,232,.4);
  border-radius:16px;
  padding:16px;
}
.decide-title{font-size:14px;font-weight:700;color:#555;margin-bottom:10px;display:flex;align-items:center;gap:6px;}
.random-btn{
  background:white;border:1.5px solid rgba(0,0,0,.1);
  border-radius:10px;padding:10px 14px;
  font-family:'Indie Flower',cursive;
  font-size:13px;font-weight:700;color:#555;
  cursor:none;width:100%;text-align:left;
  transition:transform .2s,box-shadow .2s;
  display:flex;align-items:center;gap:8px;
}
.random-btn:hover{transform:translateY(-2px);box-shadow:0 4px 10px rgba(0,0,0,.08);}

/* ── MAIN CONTENT ── */
.main{flex:1;min-width:0;}

/* hero title area */
.zines-hero{
  background:white;
  padding:22px 28px 28px;
  margin-bottom:20px;
  position:relative;
  box-shadow:2px 3px 10px rgba(0,0,0,.06);
  clip-path:polygon(0 0,100% 0,100% 84%,99% 90%,97% 84%,95% 91%,93% 84%,91% 91%,89% 84%,87% 91%,85% 84%,83% 91%,81% 84%,79% 91%,77% 84%,75% 91%,73% 84%,71% 91%,69% 84%,67% 91%,65% 84%,63% 91%,61% 84%,59% 91%,57% 84%,55% 91%,53% 84%,51% 91%,49% 84%,47% 91%,45% 84%,43% 91%,41% 84%,39% 91%,37% 84%,35% 91%,33% 84%,31% 91%,29% 84%,27% 91%,25% 84%,23% 91%,21% 84%,19% 91%,17% 84%,15% 91%,13% 84%,11% 91%,9% 84%,7% 91%,5% 84%,3% 91%,1% 84%,0 88%);
  padding-bottom:40px;
}
.zines-hero::before{
  content:'';position:absolute;top:-10px;left:50%;transform:translateX(-50%);
  width:80px;height:20px;border-radius:3px;
  background:repeating-linear-gradient(90deg,rgba(244,167,185,.55) 0,rgba(244,167,185,.3) 4px,rgba(244,167,185,.55) 8px);
}
.hero-row{display:flex;align-items:flex-start;justify-content:space-between;}
.hero-left h1{
  font-size:56px;font-weight:800;color:#1a1a1a;line-height:1;
  display:flex;align-items:center;gap:10px;
}
.hero-left h1 .heart{font-size:32px;color:#f4a7b9;}
.hero-sub{font-size:14px;color:#aaa;margin-top:6px;font-weight:600;}

/* search bar */
.search-wrap{
  display:flex;align-items:center;gap:10px;
  background:white;border:1.5px solid rgba(0,0,0,.1);
  border-radius:40px;padding:10px 18px;
  box-shadow:0 2px 8px rgba(0,0,0,.06);
  width:340px;
}
.search-wrap svg{flex-shrink:0;opacity:.4;}
#search{
  border:none;outline:none;
  font-family:'Indie Flower',cursive;
  font-size:14px;color:#555;background:transparent;
  width:100%;
}
#search::placeholder{color:#ccc;}

/* doodle near search */
.hero-doodle{
  position:absolute;right:360px;top:24px;
  pointer-events:none;opacity:.5;
}

/* ── FILTER BAR ── */
.filter-bar{
  display:flex;align-items:center;gap:8px;
  margin-bottom:22px;flex-wrap:wrap;
}
.filter-tags{display:flex;gap:8px;flex-wrap:wrap;flex:1;}

.ftag{
  font-family:'Indie Flower',cursive;
  font-size:13px;font-weight:700;
  padding:6px 14px;border-radius:20px;
  border:1.5px solid rgba(0,0,0,.1);
  background:white;color:#666;
  cursor:none;transition:all .2s;
}
.ftag:hover{border-color:#f4a7b9;color:#f4a7b9;}
.ftag.active{background:#f4a7b9;border-color:#f4a7b9;color:white;}

.sort-wrap{
  display:flex;align-items:center;gap:8px;
  font-size:13px;color:#aaa;font-weight:700;margin-left:auto;
}
.sort-wrap select{
  font-family:'Indie Flower',cursive;
  font-size:13px;color:#666;
  border:1.5px solid rgba(0,0,0,.1);
  border-radius:10px;padding:6px 10px;
  background:white;cursor:pointer;outline:none;
}

/* ── ZINE GRID ── */
#grid{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:18px;
}

.zine-card{
  cursor:none;transition:transform .22s,box-shadow .22s;
  text-decoration:none;color:inherit;
  display:block;
  border-radius:16px;
  background:white;
  border:1.5px solid rgba(0,0,0,.07);
  overflow:hidden;
  box-shadow:1px 2px 0 rgba(0,0,0,.04);
  animation:cardIn .4s ease both;
}
.zine-card:hover{transform:translateY(-6px) rotate(-1deg);box-shadow:4px 10px 22px rgba(0,0,0,.1);}
@keyframes cardIn{from{opacity:0;transform:translateY(12px);}to{opacity:1;transform:translateY(0);}}

/* thumb */
.zine-thumb{
  width:100%;aspect-ratio:3/4;
  position:relative;overflow:hidden;
  display:flex;align-items:center;justify-content:center;
  padding:16px;
}

/* gingham pattern overlay */
.gingham-pink::after,.gingham-blue::after{
  content:'';position:absolute;inset:0;opacity:.35;
}
.gingham-pink::after{
  background-image:
    repeating-linear-gradient(0deg,rgba(244,167,185,.4) 0,rgba(244,167,185,.4) 1px,transparent 1px,transparent 14px),
    repeating-linear-gradient(90deg,rgba(244,167,185,.4) 0,rgba(244,167,185,.4) 1px,transparent 1px,transparent 14px);
}
.gingham-blue::after{
  background-image:
    repeating-linear-gradient(0deg,rgba(168,200,232,.5) 0,rgba(168,200,232,.5) 1px,transparent 1px,transparent 14px),
    repeating-linear-gradient(90deg,rgba(168,200,232,.5) 0,rgba(168,200,232,.5) 1px,transparent 1px,transparent 14px);
}
.stars-bg::after{
  content:'✦ ✧ ✦ ✧ ✦ ✧ ✦ ✧ ✦ ✧ ✦ ✧';
  position:absolute;inset:0;display:flex;flex-wrap:wrap;align-content:space-around;justify-content:space-around;
  font-size:10px;color:rgba(255,255,255,.4);letter-spacing:6px;line-height:2;
  pointer-events:none;
}

.zine-thumb-title{
  font-size:22px;font-weight:800;
  text-align:center;line-height:1.4;
  position:relative;z-index:1;
  color:#333;
  padding:0 10px;
}

.new-badge{
  position:absolute;top:10px;left:10px;z-index:2;
  background:#f4a7b9;color:white;
  font-size:10px;font-weight:800;
  padding:3px 9px;border-radius:4px;
  letter-spacing:.5px;
}
.live-badge{position:absolute;top:10px;left:10px;z-index:2;background:#2d2d2d;color:white;font-size:10px;font-weight:800;padding:3px 9px;border-radius:4px;letter-spacing:.4px;}
.soon-overlay{position:absolute;bottom:0;left:0;right:0;background:rgba(255,255,255,.72);backdrop-filter:blur(2px);text-align:center;padding:5px;font-size:11px;font-weight:700;color:#aaa;z-index:3;}
.zine-cover-full{width:100%;aspect-ratio:3/4;object-fit:cover;display:block;pointer-events:none;-webkit-user-drag:none;}

.thumb-icon{
  position:absolute;bottom:12px;right:12px;
  font-size:20px;z-index:2;
}
.thumb-icon2{
  position:absolute;top:12px;right:12px;
  font-size:18px;z-index:2;
}

/* card info */
.zine-info{
  padding:12px 14px 14px;
}
.zine-name{
  font-size:13px;font-weight:700;
  line-height:1.4;color:#333;margin-bottom:4px;
}
.zine-date{font-size:11px;color:#bbb;margin-bottom:8px;}
.zine-tags{display:flex;gap:5px;flex-wrap:wrap;}
.ztag{
  font-family:'Indie Flower',cursive;
  font-size:11px;color:#888;
  background:#f5f5f5;
  padding:2px 8px;border-radius:10px;
}

/* no results */
.no-results{
  grid-column:1/-1;
  text-align:center;padding:60px 20px;
  font-size:18px;color:#bbb;
}

/* star doodle right */
.star-doodle-r{
  position:absolute;right:-10px;top:260px;
  pointer-events:none;
}

/* ── ENTRANCE ANIMATIONS ── */
.sidebar,.main{opacity:0;animation:fadeUp .5s ease forwards;}
.sidebar{animation-delay:.1s;}
.main{animation-delay:.2s;}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px);}to{opacity:1;transform:translateY(0);}}

/* responsive */
@media(max-width:1000px){
  .page{flex-direction:column;}
  .sidebar{width:100%;flex-direction:row;flex-wrap:wrap;}
  .tags-box{flex:1;}
  #grid{grid-template-columns:repeat(2,1fr);}
}
</style>
</head>
<body>

<div id="cur">
  <svg viewBox="0 0 20 20" fill="none"><circle cx="10" cy="10" r="4.5" fill="#f4a7b9" opacity=".9"/><circle cx="10" cy="10" r="8" stroke="#f4a7b9" stroke-width="1.4" opacity=".35"/></svg>
</div>

<!-- ── NAV ── -->
<nav>
  <a href="index.html" class="nav-brand">
    <div class="nav-title">mischievous playground <span>♡</span></div>
    <div class="nav-sub">small things i'm figuring out</div>
  </a>

  <div class="nav-links">
    <a href="zines.html" class="active">
      zines
      <svg width="16" height="16" viewBox="0 0 16 16"><polygon points="8,1 10,6 15,6 11,9.5 12.5,15 8,11.5 3.5,15 5,9.5 1,6 6,6" stroke="#f4a7b9" stroke-width="1.5" fill="none"/></svg>
    </a>
    <a href="words.html">word world</a>
    <a href="discovery.html">discovery</a>
    <a href="about.html">about</a>
  </div>

  <div class="nav-right">
    <div class="sticky-nav">
      take me<br>somewhere
      <span class="arr">→</span>
    </div>
    <div class="nav-circle">:)</div>
  </div>
</nav>

<!-- torn edge -->
<div class="torn-line"></div>

<!-- nav flower doodle -->
<div class="nav-flower">
  <svg width="36" height="36" viewBox="0 0 36 36">
    <circle cx="18" cy="18" r="5" fill="#f4a7b9"/>
    <ellipse cx="18" cy="6" rx="5" ry="6" stroke="#f4a7b9" stroke-width="1.8" fill="white"/>
    <ellipse cx="18" cy="30" rx="5" ry="6" stroke="#f4a7b9" stroke-width="1.8" fill="white"/>
    <ellipse cx="6" cy="18" rx="6" ry="5" stroke="#f4a7b9" stroke-width="1.8" fill="white"/>
    <ellipse cx="30" cy="18" rx="6" ry="5" stroke="#f4a7b9" stroke-width="1.8" fill="white"/>
  </svg>
</div>

<!-- ── PAGE ── -->
<div class="page">

  <!-- LEFT SIDEBAR -->
  <aside class="sidebar">

    <!-- cat -->
    <div class="cat-area">
      <div class="cat-speech-sb">meow</div>
      <svg width="100" height="100" viewBox="0 0 100 100" fill="none">
        <ellipse cx="50" cy="76" rx="30" ry="22" fill="#1c1c1c"/>
        <ellipse cx="50" cy="52" rx="28" ry="27" fill="#1c1c1c"/>
        <polygon points="26,36 17,12 38,26" fill="#1c1c1c"/>
        <polygon points="74,36 83,12 62,26" fill="#1c1c1c"/>
        <polygon points="27,34 19,14 37,26" fill="#c9a6e8" opacity=".5"/>
        <polygon points="73,34 81,14 63,26" fill="#c9a6e8" opacity=".5"/>
        <ellipse cx="42" cy="50" rx="6" ry="7" fill="#ffd97d"/>
        <ellipse cx="58" cy="50" rx="6" ry="7" fill="#ffd97d"/>
        <ellipse cx="42" cy="51" rx="3.5" ry="5.5" fill="#111"/>
        <ellipse cx="58" cy="51" rx="3.5" ry="5.5" fill="#111"/>
        <circle cx="44" cy="48" r="1.5" fill="white"/>
        <circle cx="60" cy="48" r="1.5" fill="white"/>
        <polygon points="50,57 47,61 53,61" fill="#f4a7b9"/>
        <path d="M46 61.5 Q50 65 54 61.5" stroke="#f4a7b9" stroke-width="1.5" fill="none" stroke-linecap="round"/>
        <line x1="24" y1="56" x2="43" y2="58" stroke="#888" stroke-width="1.2" opacity=".5"/>
        <line x1="24" y1="61" x2="43" y2="60" stroke="#888" stroke-width="1.2" opacity=".5"/>
        <line x1="57" y1="58" x2="76" y2="56" stroke="#888" stroke-width="1.2" opacity=".5"/>
        <line x1="57" y1="60" x2="76" y2="61" stroke="#888" stroke-width="1.2" opacity=".5"/>
      </svg>
    </div>

    <!-- tags box -->
    <div class="tags-box">
      <div class="tags-box-title">
        <svg width="16" height="16"><polygon points="8,1 10,5.5 15,5.5 11.5,8.5 13,13 8,10 3,13 4.5,8.5 1,5.5 6,5.5" fill="#f4a7b9"/></svg>
        tags
      </div>
      <div id="tag-list"></div>
    </div>

    <!-- flower -->
    <div class="sidebar-flower">
      <svg width="34" height="34">
        <circle cx="17" cy="17" r="4.5" fill="#a8d8a8"/>
        <ellipse cx="17" cy="6" rx="4.5" ry="6" stroke="#a8d8a8" stroke-width="1.8" fill="white"/>
        <ellipse cx="17" cy="28" rx="4.5" ry="6" stroke="#a8d8a8" stroke-width="1.8" fill="white"/>
        <ellipse cx="6" cy="17" rx="6" ry="4.5" stroke="#a8d8a8" stroke-width="1.8" fill="white"/>
        <ellipse cx="28" cy="17" rx="6" ry="4.5" stroke="#a8d8a8" stroke-width="1.8" fill="white"/>
      </svg>
    </div>

    <!-- can't decide -->
    <div class="decide-box">
      <div class="decide-title">
        can't decide? 
        <svg width="16" height="16"><circle cx="8" cy="8" r="7" stroke="#c9a6e8" stroke-width="1.5" fill="none"/><circle cx="5.5" cy="6.5" r="1.2" fill="#c9a6e8"/><circle cx="10.5" cy="6.5" r="1.2" fill="#c9a6e8"/><path d="M5 10.5 Q8 13 11 10.5" stroke="#c9a6e8" stroke-width="1.3" fill="none" stroke-linecap="round"/></svg>
      </div>
      <button class="random-btn" onclick="goRandom()">
        read something random
        <svg width="16" height="16"><polygon points="8,1 10,6 15,6 11.5,9 13,14 8,11 3,14 4.5,9 1,6 6,6" stroke="#ffd97d" stroke-width="1.5" fill="none"/></svg>
      </button>
    </div>

  </aside>

  <!-- MAIN -->
  <main class="main">

    <!-- star doodle right side -->
    <div class="star-doodle-r">
      <svg width="30" height="30">
        <polygon points="15,2 18,10 27,10 20.5,15 23,23 15,18 7,23 9.5,15 3,10 12,10" stroke="#ffd97d" stroke-width="2" fill="none"/>
      </svg>
    </div>

    <!-- hero -->
    <div class="zines-hero">
      <div class="hero-row">
        <div class="hero-left">

<script>
// ── ZINE DATA ── edit here to add/update zines
const ZINES = [
  { id:1, title:"lazy & affordable skincare routine", date:"may 18, 2024", tags:["skincare","routine","lazy"], isNew:true, live:true, cover:"https://res.cloudinary.com/djenzu1lm/image/upload/v1777475340/a_e8vbyt.png", bg:"linear-gradient(160deg,#ffd6e0,#ffc2ce)", icon:"♡", link:"zines/skincare-routine.html" },
  { id:2, title:"how i check ingredients", date:"may 10, 2024", tags:["ingredient","learning"], isNew:false, live:false, cover:null, bg:"linear-gradient(160deg,#e8d8f8,#d4b8f0)", icon:"🔍", link:"upcoming.html" },
  { id:3, title:"night routine", date:"may 02, 2024", tags:["routine","skincare","night"], isNew:false, live:false, cover:null, bg:"linear-gradient(160deg,#fff8dc,#ffe89a)", icon:"🌙", link:"upcoming.html" },
  { id:4, title:"empties diary", date:"apr 28, 2024", tags:["empties","skincare","review"], isNew:true, live:false, cover:null, bg:"linear-gradient(160deg,#d8f0e8,#b8e4d0)", icon:"💛", link:"upcoming.html" },
  { id:5, title:"ingredient basics for beginners", date:"apr 20, 2024", tags:["ingredient","learning","basics"], isNew:false, live:false, cover:null, bg:"linear-gradient(160deg,#ffeedd,#ffd4b0)", icon:"🧪", link:"upcoming.html" },
  { id:6, title:"simple cleanser is enough", date:"apr 15, 2024", tags:["skincare","cleanser","minimal"], isNew:true, live:false, cover:null, bg:"linear-gradient(160deg,#fde8f0,#ffcce0)", icon:"💧", link:"upcoming.html" },
  { id:7, title:"japanese recycling labels guide", date:"apr 10, 2024", tags:["discovery","japan","sustainability"], isNew:false, live:false, cover:null, bg:"linear-gradient(160deg,#e8f8e8,#c8ecc8)", icon:"♻️", link:"upcoming.html" },
  { id:8, title:"a soft reminder for today", date:"apr 05, 2024", tags:["thoughts","life","reminder"], isNew:false, live:false, cover:null, bg:"linear-gradient(160deg,#d8d0f8,#bfb0f0)", icon:"♡", link:"upcoming.html" }
];

// auto-compute tag counts
const TAG_COUNTS = {};
ZINES.forEach(z => z.tags.forEach(t => { TAG_COUNTS[t] = (TAG_COUNTS[t]||0)+1; }));
</script>
<script>
// cursor
const cur = document.getElementById('cur');
document.addEventListener('mousemove', e => { cur.style.left=e.clientX+'px'; cur.style.top=e.clientY+'px'; });

// sparkle
const syms=['✦','✧','♡','✿','★'];
const cols=['#f4a7b9','#c9a6e8','#ffd97d','#a8d8a8'];
document.addEventListener('click', e => {
  if(e.target.closest('a,button,select,input')) return;
  for(let i=0;i<4;i++){
    const el=document.createElement('span');
    el.textContent=syms[Math.floor(Math.random()*syms.length)];
    const a=Math.random()*Math.PI*2,d=25+Math.random()*35;
    el.style.cssText=`position:fixed;left:${e.clientX}px;top:${e.clientY}px;font-size:${11+Math.random()*10}px;color:${cols[Math.floor(Math.random()*cols.length)]};pointer-events:none;z-index:99998;--tx:${Math.cos(a)*d}px;--ty:${Math.sin(a)*d}px;animation:burst .65s ease forwards;`;
    document.body.appendChild(el);
    setTimeout(()=>el.remove(),650);
  }
});
const s=document.createElement('style');
s.textContent='@keyframes burst{0%{opacity:1;transform:translate(0,0) scale(1);}100%{opacity:0;transform:translate(var(--tx),var(--ty)) scale(.3);}}';
document.head.appendChild(s);

// state
let activeTag = 'all';

// render sidebar tags
function renderSidebarTags() {
  const el = document.getElementById('tag-list');
  el.innerHTML = Object.entries(TAG_COUNTS).map(([tag, count]) => `
    <div class="tag-row" onclick="setTag('${tag}')">
      <span class="tag-name">${tag}</span>
      <span class="tag-count">(${count})</span>
    </div>
  `).join('');
}

// render filter tags
const ALL_TAGS = ['all','skincare','routine','ingredient','learning','thoughts','life','random','empties'];
function renderFilterTags() {
  const el = document.getElementById('filter-tags');
  el.innerHTML = ALL_TAGS.map(tag => `
    <button class="ftag${tag===activeTag?' active':''}" onclick="setTag('${tag}')">${tag}</button>
  `).join('');
}

function setTag(tag) {
  activeTag = tag;
  renderFilterTags();
  renderZines();
}

// render grid
function renderZines() {
  const keyword = document.getElementById('search').value.toLowerCase();
  const sort = document.getElementById('sort-select').value;

  let list = ZINES.filter(z => {
    const matchTag = activeTag==='all' || z.tags.includes(activeTag);
    const matchSearch = z.title.toLowerCase().includes(keyword);
    return matchTag && matchSearch;
  });

  if(sort==='newest') list = [...list].reverse();
  else if(sort==='oldest') { /* default order */ }
  else if(sort==='az') list = [...list].sort((a,b)=>a.title.localeCompare(b.title));

  const grid = document.getElementById('grid');
  if(!list.length) {
    grid.innerHTML = '<div class="no-results">no zines found ✦ try another tag!</div>';
    return;
  }

  grid.innerHTML = list.map((z,i) => {
    const liveBadge = z.live ? '<span class="live-badge">✦ LIVE</span>' : '';
    const newBadge  = z.isNew && !z.live ? '<span class="new-badge">NEW</span>' : '';
    const soon      = !z.live ? '<div class="soon-overlay">coming soon~</div>' : '';
    const thumb = z.cover
      ? `<div style="position:relative;">${liveBadge}<img class="zine-cover-full" src="${z.cover}" alt="${z.title}" loading="lazy"></div>`
      : `<div class="zine-thumb" style="background:${z.bg};">${liveBadge}${newBadge}<div class="zine-thumb-title">${z.title}</div>${z.icon?`<span class="thumb-icon2">${z.icon}</span>`:''}${soon}</div>`;
    return `
    <a href="${z.link}" class="zine-card" style="animation-delay:${i*.07}s;${!z.live?'opacity:.85':''}">
      ${thumb}
      <div class="zine-info">
        <div class="zine-name">${z.title}</div>
        <div class="zine-date">${z.date}</div>
        <div class="zine-tags">${z.tags.map(t=>`<span class="ztag">${t}</span>`).join('')}</div>
      </div>
    </a>`;
  }).join('');
}

function goRandom() {
  const r = ZINES[Math.floor(Math.random()*ZINES.length)];
  window.location.href = r.link;
}

document.getElementById('search').addEventListener('input', renderZines);

// init
renderSidebarTags();
renderFilterTags();
renderZines();
</script>
</body>
