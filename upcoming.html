body{
  background:#f2f0ec;

  color:#2d2d2d;
  min-height:100vh;
  overflow-x:hidden;
  cursor:none;

}

#cur{position:fixed;width:20px;height:20px;pointer-events:none;z-index:99999;transform:translate(-50%,-50%);}

/* ── NAV ── */
nav{
  display:flex;align-items:center;
  padding:20px 40px;
  position:relative;z-index:10;
}
.nav-brand{display:flex;flex-direction:column;text-decoration:none;color:inherit;margin-right:auto;}
.nav-title{font-size:17px;font-weight:800;display:flex;align-items:center;gap:6px;}
.nav-title .ht{color:#f4a7b9;font-size:14px;}
.nav-sub{font-size:11px;color:#bbb;margin-top:1px;}
.nav-links{display:flex;gap:32px;}
.nav-links a{
  font-family:'Indie Flower',cursive;font-size:16px;color:#555;
  text-decoration:none;position:relative;padding-bottom:3px;transition:color .2s;
}
.nav-links a::after{content:'';position:absolute;bottom:0;left:0;width:100%;height:2.5px;border-radius:2px;transform:scaleX(0);transition:transform .25s;transform-origin:left;}
.nav-links a:nth-child(1)::after{background:#f4a7b9;}
.nav-links a:nth-child(2)::after{background:#a8d8a8;}
.nav-links a:nth-child(3)::after{background:#a8c8e8;}
.nav-links a:nth-child(4)::after{background:#c9a6e8;}
.nav-links a:hover::after,.nav-links a.active::after{transform:scaleX(1);}
.nav-links a:hover,.nav-links a.active{color:#222;}
.nav-right{display:flex;align-items:center;gap:14px;margin-left:32px;}
.sticky-nav{
  width:115px;background:#fffde7;border:1px solid rgba(0,0,0,.07);
  padding:10px 12px 14px;box-shadow:2px 3px 8px rgba(0,0,0,.09);
  transform:rotate(1.5deg);font-size:13px;font-weight:700;color:#666;
  line-height:1.5;position:relative;transition:transform .2s;cursor:none;
}
.sticky-nav::before{content:'';position:absolute;top:-8px;left:10px;width:32px;height:13px;border-radius:2px;background:rgba(201,166,232,.5);}
.sticky-nav:hover{transform:rotate(0deg) scale(1.04);}
.sticky-nav .arr{color:#f4a7b9;font-size:16px;display:block;margin-top:4px;}
.nav-circle{width:30px;height:30px;border:2px solid #ccc;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;color:#ccc;transition:transform .3s,border-color .3s;}
.nav-circle:hover{transform:rotate(20deg);border-color:#f4a7b9;color:#f4a7b9;}

/* ── MAIN AREA ── */
.main{
  min-height:calc(100vh - 90px);
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  padding:20px 40px 60px;
  position:relative;
}

    91% 0,92% 4%,93% 1%,94% 5%,95% 0,96% 4%,97% 1%,98% 4%,99% 1%,100% 4%,
    100% 94%,99% 98%,98% 94%,97% 99%,96% 95%,95% 100%,94% 96%,93% 100%,92% 95%,91% 99%,
    90% 94%,89% 98%,88% 94%,87% 100%,86% 95%,85% 99%,84% 94%,83% 98%,82% 94%,81% 99%,
    80% 95%,79% 100%,78% 95%,77% 99%,76% 94%,75% 98%,74% 95%,73% 100%,72% 95%,71% 99%,
    70% 94%,69% 98%,68% 95%,67% 100%,66% 95%,65% 99%,64% 94%,63% 98%,62% 95%,61% 99%,
    60% 94%,59% 98%,58% 95%,57% 100%,56% 95%,55% 99%,54% 94%,53% 98%,52% 95%,51% 99%,
    50% 94%,49% 98%,48% 95%,47% 100%,46% 95%,45% 99%,44% 94%,43% 98%,42% 95%,41% 99%,
    40% 94%,39% 98%,38% 95%,37% 100%,36% 95%,35% 99%,34% 94%,33% 98%,32% 95%,31% 99%,

    linear-gradient(90deg,rgba(180,210,255,.12) 1px,transparent 1px);
  background-size:22px 22px;
  background-color:white;
}

/* gingham tape top center */
.tape-top{
  position:absolute;top:-10px;left:50%;transform:translateX(-50%);
  width:88px;height:22px;border-radius:3px;
  background:
    repeating-linear-gradient(45deg,rgba(244,167,185,.65) 0,rgba(244,167,185,.65) 3px,rgba(255,220,228,.5) 3px,rgba(255,220,228,.5) 6px);
  opacity:.85;
}

.paper-title{
  font-size:52px;font-weight:800;
  color:#1a1a1a;line-height:1.1;
  margin-bottom:18px;
  /* dash lines left */
  position:relative;
}
/* little lines before title */
.paper-title::before{
  content:'';position:absolute;left:-12px;top:50%;transform:translateY(-50%);
  width:8px;height:2px;background:#aaa;border-radius:2px;
  box-shadow:0 -6px 0 #aaa, 0 6px 0 #aaa;
}

.paper-body{
  font-size:20px;color:#555;line-height:1.65;
  margin-bottom:22px;
}
/* highlight "under construction" */
.highlight{
  background:#ffd97d;
  padding:1px 4px;border-radius:3px;
  color:#555;
}

/* purple washi + note */
.note-wrap{position:relative;display:inline-block;margin-top:4px;}
.note-washi{
  position:absolute;top:-9px;left:50%;transform:translateX(-50%);
  width:50px;height:14px;border-radius:2px;
  background:repeating-linear-gradient(90deg,rgba(168,200,232,.6) 0,rgba(168,200,232,.35) 4px,rgba(168,200,232,.6) 8px);
  opacity:.7;
}
.note{
  background:#e8d8ff;
  padding:10px 24px 12px;
  border-radius:6px;
  font-size:17px;font-weight:700;color:#666;
  display:inline-block;
  position:relative;
}

/* star doodle top-right of paper */
.paper-star{
  position:absolute;top:20px;right:24px;
  animation:spin 8s linear infinite;
}
@keyframes spin{0%{transform:rotate(0deg);}100%{transform:rotate(360deg);}}

/* ── SCATTERED DOODLES ── */
.doodle{
  position:absolute;pointer-events:none;user-select:none;
  animation:dfloat var(--dur,4s) ease-in-out infinite;
  animation-delay:var(--del,0s);
}
@keyframes dfloat{0%,100%{transform:translateY(0) rotate(var(--r,0deg));}50%{transform:translateY(-8px) rotate(var(--r,0deg));}}

/* cat peek right */
.cat-area{
  position:absolute;
  right:80px;top:80px;
  display:flex;flex-direction:column;align-items:flex-start;
  pointer-events:none;
}
.cat-speech-up{
  background:white;border:2px solid #2d2d2d;border-radius:16px;
  padding:8px 14px;font-size:13px;font-weight:700;
  white-space:nowrap;position:relative;margin-bottom:6px;margin-left:8px;
  animation:wobble 5s ease-in-out infinite;
}
@keyframes wobble{0%,100%{transform:rotate(-1deg);}50%{transform:rotate(1.5deg);}}
.cat-speech-up::after{content:'';position:absolute;bottom:-12px;right:18px;border:7px solid transparent;border-top-color:#2d2d2d;}
.cat-speech-up::before{content:'';position:absolute;bottom:-7px;right:20px;border:5px solid transparent;border-top-color:white;z-index:1;}

/* curly arrow left */
.curly-arrow{
  position:absolute;left:100px;top:55%;
  pointer-events:none;
  animation:dfloat 5s ease-in-out infinite;
  animation-delay:.5s;
}

/* sticky notes */
.sticky-bl{
  position:absolute;bottom:80px;left:60px;
  width:140px;background:#fde8ee;
  border:1px solid rgba(0,0,0,.07);
  padding:14px 14px 18px;
  box-shadow:3px 4px 10px rgba(0,0,0,.09);
  transform:rotate(-2deg);
  font-size:14px;font-weight:700;color:#888;
  line-height:1.6;
}
.sticky-bl::before{
  content:'';position:absolute;top:-8px;left:12px;
  width:42px;height:14px;border-radius:2px;
  background:repeating-linear-gradient(90deg,rgba(255,200,180,.7) 0,rgba(255,200,180,.4) 4px,rgba(255,200,180,.7) 8px);
}
.sticky-bl .s-heart{color:#f4a7b9;}

.sticky-br{
  position:absolute;bottom:80px;right:60px;
  width:150px;background:#fafaf0;
  border:1px solid rgba(0,0,0,.07);
  padding:14px 14px 18px;
  box-shadow:3px 4px 10px rgba(0,0,0,.09);
  transform:rotate(1.5deg);
  font-size:14px;font-weight:700;color:#888;
  line-height:1.6;
}
.sticky-br::before{
  content:'';position:absolute;top:-8px;right:12px;
  width:38px;height:14px;border-radius:2px;
  background:repeating-linear-gradient(90deg,rgba(168,216,168,.7) 0,rgba(168,216,168,.4) 4px,rgba(168,216,168,.7) 8px);
}
.sticky-br .s-heart{color:#c9a6e8;}

/* ── BOTTOM ACTIONS ── */
.actions{
  display:flex;flex-direction:column;align-items:center;
  gap:14px;
  margin-top:32px;
  position:relative;z-index:2;
}

.random-btn{
  font-family:'Indie Flower',cursive;
  font-size:18px;font-weight:700;color:#333;
  background:white;
  border:2px solid #2d2d2d;
  border-radius:40px;
  padding:14px 36px;
  display:flex;align-items:center;gap:10px;
  cursor:none;
  transition:transform .22s,box-shadow .22s;
  box-shadow:2px 3px 0 rgba(0,0,0,.08);
}
.random-btn:hover{transform:translateY(-4px);box-shadow:4px 8px 18px rgba(0,0,0,.1);}

/* little lines beside button */
.btn-lines{
  position:absolute;right:-34px;top:50%;transform:translateY(-50%);
  pointer-events:none;opacity:.5;
}

.go-home{
  font-family:'Indie Flower',cursive;
  font-size:16px;color:#aaa;text-decoration:none;
  display:flex;align-items:center;gap:6px;
  transition:color .2s;
  position:relative;
}
.go-home:hover{color:#f4a7b9;}
/* underline */
.go-home::after{
  content:'';position:absolute;bottom:-3px;left:0;right:0;
  height:2px;background:#c9a6e8;border-radius:2px;opacity:.5;
}

/* responsive */
@media(max-width:768px){
  nav{padding:14px 20px;}
  .main{padding:20px;}
  .paper{padding:32px 24px 44px;}
  .paper-title{font-size:38px;}
  .cat-area,.sticky-bl,.sticky-br,.curly-arrow{display:none;}
  .doodle{display:none;}
}

body.dark .go-home:hover{color:#f8b8c9;}
</style>
</head>

      <div class="btn-lines">
        <svg width="22" height="22"><line x1="0" y1="4" x2="10" y2="4" stroke="#aaa" stroke-width="1.5" stroke-linecap="round"/><line x1="4" y1="11" x2="14" y2="11" stroke="#aaa" stroke-width="1.5" stroke-linecap="round"/><line x1="0" y1="18" x2="10" y2="18" stroke="#aaa" stroke-width="1.5" stroke-linecap="round"/></svg>
      </div>
    </div>

    <a href="index.html" class="go-home">← go home</a>
  </div>

</div>

<script>
// cursor
const cur = document.getElementById('cur');
document.addEventListener('mousemove', e => { cur.style.left=e.clientX+'px'; cur.style.top=e.clientY+'px'; });

// highlight active nav based on current page
const path = location.pathname;
if(path.includes('words')) document.getElementById('nav-words')?.classList.add('active');
if(path.includes('discovery')) document.getElementById('nav-disc')?.classList.add('active');
if(path.includes('about')) document.getElementById('nav-about')?.classList.add('active');

// sparkle
const syms=['✦','✧','♡','✿','★','◇'];
const cols=['#f4a7b9','#c9a6e8','#ffd97d','#a8d8a8','#a8c8e8'];
document.addEventListener('click', e => {
  for(let i=0;i<5;i++){
    const el=document.createElement('span');
    el.textContent=syms[Math.floor(Math.random()*syms.length)];
    const a=Math.random()*Math.PI*2,d=28+Math.random()*40;
    el.style.cssText=`position:fixed;left:${e.clientX}px;top:${e.clientY}px;font-size:${12+Math.random()*12}px;color:${cols[Math.floor(Math.random()*cols.length)]};pointer-events:none;z-index:99998;--tx:${Math.cos(a)*d}px;--ty:${Math.sin(a)*d}px;animation:burst .7s ease forwards;`;
    document.body.appendChild(el);
    setTimeout(()=>el.remove(),700);
  }
});
const s=document.createElement('style');
s.textContent='@keyframes burst{0%{opacity:1;transform:translate(0,0) scale(1);}100%{opacity:0;transform:translate(var(--tx),var(--ty)) scale(.3);}}';
document.head.appendChild(s);

// random zine
const ZINE_LINKS = [
  'zines/skincare-routine.html',
  'zines/check-ingredients.html',
  'zines/night-routine.html',
  'zines/empties-diary.html',
];
function goRandom() {
  const r = ZINE_LINKS[Math.floor(Math.random() * ZINE_LINKS.length)];
  window.location.href = r;
}
</script>
<script src="theme.js"></script>
</body>
</html>
